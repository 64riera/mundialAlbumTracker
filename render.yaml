services:
  - type: web
    name: mundial-album-api
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/mundialAlbumTracker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerTarget: prod
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
    preDeployCommand: npx prisma migrate deploy
