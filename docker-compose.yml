services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mundial
      POSTGRES_PASSWORD: mundial
      POSTGRES_DB: mundial_album
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mundial -d mundial_album"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      DATABASE_URL: postgresql://mundial:mundial@db:5432/mundial_album
      PORT: 3001
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate dev --name init --skip-seed && npx prisma db seed && npm run dev"

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
